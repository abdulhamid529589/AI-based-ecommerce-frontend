<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Bedtex - Premium Bedding & Textile Products - Shop high quality products with best prices"
    />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bedtex" />

    <!-- Optimization -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Bedtex - Premium Bedding & Textile Products</title>
  </head>
  <body>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (t) {
            document.documentElement.classList.add(t)
          } else {
            // Default to dark mode when no stored preference
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          // ignore
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
